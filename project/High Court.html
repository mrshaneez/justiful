<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>JUSTICEDESK — High Court Case Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Faruma';
    src: url('assets/Faruma.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0780-07BF, U+FDF2; /* Thaana block */
  }
  /* Dhivehi text — apply via .dv class or [lang="dv"] */
  .dv, [lang="dv"] {
    font-family: 'Faruma', 'Inter Tight', sans-serif;
    direction: rtl;
    unicode-bidi: embed;
    font-feature-settings: normal;
    line-height: 1.7;
  }
  :root {
    --ink: #0b0d10;
    --ink-2: #1c1f24;
    --ink-3: #2a2e35;
    --paper: #fafaf8;
    --paper-2: #f3f3ef;
    --paper-3: #ebebe5;
    --line: #e2e2dc;
    --line-2: #d3d3cb;
    --line-soft: #ededeb;
    --text: #0b0d10;
    --text-2: #5b5e63;
    --text-3: #8a8d92;
    --accent: #1f3a3d;          /* deep teal-ink, restrained */
    --accent-soft: #e6ebe9;
    --warn: #8b6914;
    --warn-soft: #f5eedc;
    --danger: #a02d2a;
    --danger-soft: #f3e3e1;
    --success: #2d5a3d;
    --success-soft: #e2ece5;
    --radius: 6px;
    --radius-lg: 10px;
    --shadow-sm: 0 1px 2px rgba(11,13,16,0.04);
    --shadow: 0 1px 3px rgba(11,13,16,0.04), 0 8px 24px rgba(11,13,16,0.04);
  }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--text); font-family: 'Inter Tight', system-ui, -apple-system, sans-serif; font-feature-settings: "ss01", "cv11"; -webkit-font-smoothing: antialiased; }
  body { font-size: 13.5px; line-height: 1.5; }
  *, *::before, *::after { box-sizing: border-box; }
  button { font-family: inherit; }
  input, textarea, select { font-family: inherit; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 99px; border: 2px solid var(--paper); }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
  ::-webkit-scrollbar-track { background: transparent; }
  #root { height: 100vh; }
  /* subtle paper grain */
  .paper-grain {
    background-image:
      radial-gradient(rgba(11,13,16,0.012) 1px, transparent 1px);
    background-size: 4px 4px;
  }
  @media print {
    aside, header { display: none !important; }
    main { overflow: visible !important; padding: 0 !important; background: #fff !important; }
    #root { height: auto !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
